<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GCchecker</title>

    <style>
        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            padding: 12px;
        }

        .gc {
            font-size: clamp(17px, 2.3vh, 27px);
            font-weight: bold;
            margin: 12px 0 6px;
        }

        .grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            border: none;
            border-radius: 8px;
            min-height: clamp(48px, 7.2vh, 85px);
            font-size: clamp(14px, 2.1vh, 23px);
            font-weight: bold;
            background: #333;
            color: #fff;
            padding: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn.active {
            background: #1e8e3e;
            color: #fff;
        }

        .result {
            margin-top: 12px;
            background: #000;
            border: 1px solid #666;
            border-radius: 8px;
            padding: 12px;
            white-space: pre-wrap;
            font-size: clamp(14px, 2.5vh, 28px);
            font-weight: bold;
            line-height: 1.4;
        }

        .reset {
            width: 100%;
            margin-top: 12px;
            border: none;
            border-radius: 8px;
            height: clamp(46px, 6.2vh, 76px);
            font-size: clamp(17px, 2.4vh, 27px);
            font-weight: bold;
            background: #b00020;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="gc">GC1</div>
<div class="grid">
    <button class="btn" data-id="t1"></button>
    <button class="btn" data-id="f1"></button>
</div>

<div class="gc">GC2</div>
<div class="grid">
    <button class="btn" data-id="f2"></button>
</div>

<div class="gc">ほのお・つなみ</div>
<div class="grid">
    <button class="btn" data-id="c5" data-label="ほのお"></button>
    <button class="btn" data-id="c6" data-label="つなみ"></button>
</div>

<div class="gc">サンダガ</div>
<div class="grid">
    <button class="btn" data-id="c8" data-label="チャージ"></button>
    <button class="btn" data-id="d8" data-label="アウト"></button>
</div>

<div class="gc">ブリザガ</div>
<div class="grid">
    <button class="btn" data-id="c9" data-label="チャージ"></button>
    <button class="btn" data-id="d9" data-label="アウト"></button>
</div>

<div id="result" class="result"></div>

<button class="reset" onclick="resetAll()">リセット</button>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GCchecker</title>

    <style>
        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            padding: 12px;
        }

        .gc {
            font-size: clamp(17px, 2.3vh, 27px);
            font-weight: bold;
            margin: 12px 0 6px;
        }

        .grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            border: none;
            border-radius: 8px;
            min-height: clamp(48px, 7.2vh, 85px);
            font-size: clamp(14px, 2.1vh, 23px);
            font-weight: bold;
            background: #333;
            color: #fff;
            padding: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn.active {
            background: #1e8e3e;
            color: #fff;
        }

        /* 箇条書きを完璧に整列させるグリッドレイアウト */
        .result {
            margin-top: 12px;
            background: #000;
            border: 1px solid #666;
            border-radius: 8px;
            padding: 12px;
            font-size: 10px; /* ★ここを10pxに固定しました */
            font-weight: bold;
            line-height: 1.4;
            
            display: grid;
            grid-template-columns: auto 1fr; /* 左列（番号）/ 右列（内容） */
            column-gap: 12px;                /* 番号と中身の間の隙間 */
            row-gap: 14px;                   /* 各番号（①〜⑦）ごとの縦の隙間 */
            align-items: start;
        }

        /* 番号（①〜⑦）が座る左側のボックス */
        .result-num {
            grid-column: 1;
            white-space: nowrap;
        }

        /* 内容（水・雷・加速度など）が収まる右側のボックス */
        .result-content {
            grid-column: 2;
            display: flex;
            flex-direction: column; /* 内部の要素を上から下に縦並びにする */
            gap: 4px;               /* 水・雷・加速度の行同士の隙間 */
            margin: 0;
        }

        /* 各テキスト行の折り返し設定 */
        .line-text {
            display: block;
            white-space: pre-wrap;
        }

        /* 文字色・ロールカラーの色定義 */
        .water-color { color: #4fc3f7; } /* 水：水色 */
        .thunder-color { color: #b388ff; } /* 雷：紫色 */
        .gaze-color { color: #ff9800; } /* 視線：オレンジ */
        .t-color { color: #1a8cff; } /* タンク：青 */
        .h-color { color: #2eb82e; } /* ヒーラー：

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GCchecker</title>

    <style>
        * { box-sizing: border-box; }

        html, body { margin: 0; padding: 0; }

        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            padding: 12px;
        }

        .gc {
            font-size: clamp(17px, 2.3vh, 27px);
            font-weight: bold;
            margin: 12px 0 6px;
        }

        .grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1; /* ボタンを均等に配置 */
            border: none;
            border-radius: 8px;
            min-height: clamp(48px, 7.2vh, 85px);
            font-size: clamp(14px, 2.1vh, 23px);
            font-weight: bold;
            background: #333;
            color: #fff;
            padding: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* アクティブ時の色（見やすい緑に統一） */
        .btn.active {
            background: #1e8e3e;
            color: #fff;
        }

        .result {
            margin-top: 12px;
            background: #000;
            border: 1px solid #666;
            border-radius: 8px;
            padding: 12px;
            white-space: pre-wrap; /* はみ出し防止にpre-wrapへ変更 */
            font-size: clamp(14px, 2.5vh, 28px); /* 文字が大きすぎたため少し調整 */
            font-weight: bold;
            line-height: 1.4;
        }

        .reset {
            width: 100%;
            margin-top: 12px;
            border: none;
            border-radius: 8px;
            height: clamp(46px, 6.2vh, 76px);
            font-size: clamp(17px, 2.4vh, 27px);
            font-weight: bold;
            background: #b00020;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="gc">GC1</div>
<div class="grid">
    <button class="btn" data-id="t1"></button>
    <button class="btn" data-id="s1"></button>
    <button class="btn" data-id="f1"></button>
</div>

<div class="gc">GC2</div>
<div class="grid">
    <button class="btn" data-id="f2"></button>
</div>

<div class="gc">ほのお・つなみ</div>
<div class="grid">
    <button class="btn" data-id="c5" data-label="ほのお"></button>
    <button class="btn" data-id="c6" data-label="つなみ"></button>
</div>

<div class="gc">サンダガ</div>
<div class="grid">
    <button class="btn" data-id="c8" data-label="チャージ"></button>
    <button class="btn" data-id="d8" data-label="アウト"></button>
</div>

<div class="gc">ブリザガ</div>
<div class="grid">
    <button class="btn" data-id="c9" data-label="チャージ"></button>
    <button class="btn" data-id="d9" data-label="アウト"></button>
</div>

<div id="result" class="result"></div>

<button class="reset" onclick="resetAll()">リセット</button>

<script>
const s = {
    firstThunderEarly: true,
    f1: true,
    f2: true,
    speedEarly: true,  
    c5: true,
    c6: true,
    c8: true,
    d8: true,
    c9: true,
    d9: true
};

// =========================
// UI同期
// =========================
function renderUI(){
    document.querySelectorAll(".btn").forEach(btn=>{
        const id = btn.dataset.id;
        let val = false;

        if(id === "t1"){
            val = s.firstThunderEarly;
        } else if(id === "s1"){
            val = s.speedEarly;
        } else {
            val = s[id];
        }

        btn.classList.toggle("active", !!val);

        if(id === "t1"){
            btn.textContent = "水雷（" + (s.firstThunderEarly ? "早" : "遅") + "）";
        } 
        else if(id === "s1"){
            btn.textContent = "加速度（" + (s.speedEarly ? "早" : "遅") + "）";
        }
        else if(id === "f1"){
            btn.textContent = s.f1 ? "真" : "偽";
        }
        else if(id === "f2"){
            btn.textContent = s.f2 ? "真" : "偽";
        }
        else {
            btn.textContent = btn.dataset.label + (val ? "（真）" : "（偽）");
        }
    });
}

// =========================
// 計算
// =========================
function calc(){
    const f1 = s.f1;
    const f2 = s.f2;

    let r1, r4;

    const r_true = "水：頭割り 雷：散開";
    const r_false = "水：散開 雷：頭割り";

    const macro1_true = " (水TH：12時/DPS：6時 雷TH：2時or10時/DPS：4時or8時)";
    const macro1_false = " (水TH：2時or10時/DPS：4時or8時 雷TH：12時/DPS：6時)";

    const macro4_true = " (水TH：A/DPS：C 雷TH：D/DPS：B)";
    const macro4_false = " (水TH：D/DPS：B 雷TH：A/DPS：C)";

    if(s.firstThunderEarly){
        r1 = (f1 ? r_true : r_false) + (f1 ? macro1_true : macro1_false);
        r4 = (f2 ? r_true : r_false) + (f2 ? macro4_true : macro4_false);
    } else {
        r1 = (f2 ? r_true : r_false) + (f2 ? macro1_true : macro1_false);
        r4 = (f1 ? r_true : r_false) + (f1 ? macro4_true : macro4_false);
    }

    const v1 = f1 ? "見ない" : "見る";
    const v4 = f2 ? "見ない" : "見る";

    const v_speed1 = f1 ? "動かない" : "動く";
    const v_speed2 = f2 ? "動かない" : "動く";

    const k5 = s.c5 ? "タケノコ" : "ドーナツ";
    const k6 = s.c6 ? "ドーナツ" : "タケノコ";

    const j8 = (s.c8 === s.d8) ? "踏まない" : "直線踏む";
    const j9 = (s.c9 === s.d9) ? "踏まない" : "扇踏む";

    let l1;

    if(j8 === "踏まない" && j9 === "踏まない"){
        l1 = "踏まない";
    }
    else if(j8 !== "踏まない" && j9 !== "踏まない"){
        l1 = "どっちも踏む";
    }
    else {
        l1 = (j8 === "踏まない") ? j9 : j8;
    }

    let text_early = "";
    let text_late = "";

    if (s.speedEarly) {
        text_early += `\n（加速度：${v_speed1}）`;
        text_late += `\n（加速度：${v_speed2}）`;
    } else {
        text_late += `\n（加速度：${v_speed1}）`;
        text_early += `\n（加速度：${v_speed2}）`;
    }

    document.getElementById("result").textContent =
`① ${r1}${text_early}
② ${v1}
③ ${k5}
④ ${r4}${text_late}
⑤ ${v4}
⑥ ${k6}
⑦ ${l1}`;
}

// =========================
// 入力
// =========================
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        const id = btn.dataset.id;

        if(id === "t1"){
            s.firstThunderEarly = !s.firstThunderEarly;
        } else if(id === "s1"){
            s.speedEarly = !s.speedEarly;
        } else {
            s[id] = !s[id];
        }

        renderUI();
        calc();
    });
});

// =========================
// リセット
// =========================
function resetAll(){
    Object.keys(s).forEach(k=>{
        if(typeof s[k] === "boolean"){
            s[k] = true;
        }
    });

    s.firstThunderEarly = true;
    s.speedEarly = true;

    renderUI();
    calc();
}

// 初期表示
renderUI();
calc();
</script>

</body>
</html>
